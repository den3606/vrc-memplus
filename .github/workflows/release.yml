name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Generate app icon
        env:
          PYTHONPATH: .
        run: python scripts/generate_icon.py

      - name: Build executable
        run: python -m PyInstaller vrcmem.spec --noconfirm --clean

      - name: Package zip
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\VRCMemPlus\VRCMemPlus.exe")) {
            throw "Build output not found: dist\VRCMemPlus\VRCMemPlus.exe"
          }
          $zip = "VRCMemPlus-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\VRCMemPlus" -DestinationPath $zip
          Get-Item $zip | Format-List Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: VRCMem+ build ${{ github.run_number }}
          body: |
            Windows x64 portable build (PyInstaller).

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Zip 内の `VRCMemPlus` フォルダを展開し、`VRCMemPlus.exe` を実行してください。
          files: VRCMemPlus-windows-x64.zip
          generate_release_notes: true
